<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS Official Player - Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        /* ... (Sara purana CSS waisa hi rahega) ... */
        body { background: #02040a; color: #fff; margin: 0; font-family: 'Inter', sans-serif; }
        .zs-player-container { width: 100%; max-width: 900px; margin: 40px auto; position: relative; border: 2px solid #D4AF37; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        video { width: 100%; display: block; background: #000; }
        .controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; display: flex; gap: 15px; align-items: center; z-index: 10; }
        .play-btn { background: #D4AF37; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="zs-player-container">
    <video id="video" crossorigin="anonymous" playsinline poster="https://files.catbox.moe/v33t1o.jpg"></video>
    <div class="controls">
        <button class="play-btn" id="playBtn">PLAY / PAUSE</button>
        <span id="timeDisplay" style="font-family: 'Orbitron'; font-size: 14px; color: #D4AF37;">00:00 / 00:00</span>
    </div>
</div>

<script>
    (function() {
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const timeDisplay = document.getElementById('timeDisplay');

        // --- FINAL SECURE LINK ---
        const source = "https://raw.githubusercontent.com/Saood96/NEW-DRM-SECURITY-TESTING/main/saood-data.txt";

        if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                // Cloudflare CORS Fix ke liye zaroori settings
                xhrSetup: function(xhr, url) {
                    xhr.withCredentials = false;
                }
            });

            hls.loadSource(source);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log("Player Ready!");
            });

            // Agar key load nahi hoti toh ye handle karega
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("HLS Error:", data.details);
                    hls.recoverMediaError();
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = source;
        }

        playBtn.addEventListener('click', () => {
            if (video.paused) video.play();
            else video.pause();
        });

        video.addEventListener('timeupdate', () => {
            const cur = Math.floor(video.currentTime);
            const dur = Math.floor(video.duration || 0);
            const format = (s) => new Date(s * 1000).toISOString().substr(14, 5);
            timeDisplay.textContent = `${format(cur)} / ${format(dur)}`;
        });
    })();
</script>
</body>
</html>
